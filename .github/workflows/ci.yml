name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: gofmt
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "${unformatted}" ]; then
            echo "These files are not gofmt'd:"; echo "${unformatted}"; exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: staticcheck
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          staticcheck ./...

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Test (race + coverage)
        run: |
          go test ./... -race -coverpkg=./internal/... -coverprofile=coverage.out
          go tool cover -func=coverage.out | tail -1

      - name: Enforce coverage floor
        env:
          FLOOR: "94.0"
        run: |
          total=$(go tool cover -func=coverage.out | tail -1 | awk '{print $3}' | tr -d '%')
          echo "total coverage: ${total}% (floor ${FLOOR}%, target 95%)"
          awk -v c="$total" -v f="$FLOOR" 'BEGIN { if (c+0 < f+0) { printf "FAIL: coverage %.1f%% below floor %.1f%%\n", c, f; exit 1 } }'

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.out
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build (all release targets)
        env:
          CGO_ENABLED: "0"
        run: |
          for target in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64; do
            GOOS="${target%/*}" GOARCH="${target#*/}" go build -o /dev/null ./cmd/keel
            echo "built ${target}"
          done
