name: test

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Start MinIO
        run: |
          docker run -d --name minio -p 9000:9000 \
            -e MINIO_ROOT_USER=minioadmin -e MINIO_ROOT_PASSWORD=minioadmin \
            minio/minio server /data
          for i in $(seq 1 30); do
            curl -fsS http://localhost:9000/minio/health/live >/dev/null 2>&1 && break
            sleep 1
          done

      - name: Vet
        run: go vet ./...

      - name: Test (race + coverage)
        env:
          KEEL_S3_TEST_ENDPOINT: http://localhost:9000
          KEEL_S3_TEST_KEY: minioadmin
          KEEL_S3_TEST_SECRET: minioadmin
        run: |
          go test ./... -race -coverpkg=./internal/... -coverprofile=coverage.out
          go tool cover -func=coverage.out | tail -1

      - name: Enforce coverage floor
        env:
          FLOOR: "94.0"
        run: |
          total=$(go tool cover -func=coverage.out | tail -1 | awk '{print $3}' | tr -d '%')
          echo "total coverage: ${total}% (floor ${FLOOR}%, target 95%)"
          awk -v c="$total" -v f="$FLOOR" 'BEGIN { if (c+0 < f+0) { printf "FAIL: coverage %.1f%% below floor %.1f%%\n", c, f; exit 1 } }'
