version: 2

updates:
  # Go module dependencies (go.mod is at the repository root).
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore(deps)"
    groups:
      # Batch all minor/patch bumps into a single PR. Major bumps (potentially
      # breaking, e.g. a vN -> vN+1) still open individually for review.
      go-modules:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  # GitHub Actions used in .github/workflows.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(ci)"
    groups:
      github-actions:
        patterns:
          - "*"
